<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="gearGrad" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#4a4f54"/>
      <stop offset="100%" stop-color="#2c3034"/>
    </radialGradient>
  </defs>
  <!-- gear teeth -->
  <g fill="url(#gearGrad)" stroke="#52585d" stroke-width="1.5">
    <g id="tooth-group">
      <rect x="94" y="20" width="12" height="22" rx="2"/>
    </g>
  </g>
  <g fill="url(#gearGrad)" stroke="#52585d" stroke-width="1.5" transform-origin="100 100">
    <rect x="94" y="20" width="12" height="22" rx="2"/>
    <rect x="94" y="20" width="12" height="22" rx="2" transform="rotate(45 100 100)"/>
    <rect x="94" y="20" width="12" height="22" rx="2" transform="rotate(90 100 100)"/>
    <rect x="94" y="20" width="12" height="22" rx="2" transform="rotate(135 100 100)"/>
    <rect x="94" y="20" width="12" height="22" rx="2" transform="rotate(180 100 100)"/>
    <rect x="94" y="20" width="12" height="22" rx="2" transform="rotate(225 100 100)"/>
    <rect x="94" y="20" width="12" height="22" rx="2" transform="rotate(270 100 100)"/>
    <rect x="94" y="20" width="12" height="22" rx="2" transform="rotate(315 100 100)"/>
  </g>
  <!-- main gear body -->
  <circle cx="100" cy="100" r="56" fill="url(#gearGrad)" stroke="#e8a33d" stroke-width="2" opacity="0.95"/>
  <circle cx="100" cy="100" r="40" fill="#1c1f22" stroke="#52585d" stroke-width="2"/>
  <circle cx="100" cy="100" r="14" fill="#3a3f44"/>
  <!-- bolt holes -->
  <g fill="#0f1113">
    <circle cx="100" cy="76" r="4"/>
    <circle cx="121" cy="100" r="4"/>
    <circle cx="100" cy="124" r="4"/>
    <circle cx="79" cy="100" r="4"/>
  </g>
</svg>
